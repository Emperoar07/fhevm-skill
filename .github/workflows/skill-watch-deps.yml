name: SKILL.md Dependency Watcher

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  check-zama-packages:
    name: Check Zama npm package versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check npm versions and compare to VERSIONS.md
        id: version_check
        run: |
          set -e

          # Packages to watch — add new ones here
          PACKAGES=(
            "@fhevm/solidity"
            "@zama-fhe/relayer-sdk"
            "@fhevm/hardhat-plugin"
            "@openzeppelin/confidential-contracts"
          )

          DATE=$(date +%Y-%m-%d)
          CHANGED_PACKAGES=""
          ISSUE_BODY="## Dependency Version Change Detected\n\nThe weekly dependency watcher found new versions of Zama packages.\nThe skill files may need updating to reflect API changes.\n\n**Date:** ${DATE}\n\n### Changed packages\n\n"

          for PKG in "${PACKAGES[@]}"; do
            echo "Checking $PKG..."
            LATEST=$(npm view "$PKG" version 2>/dev/null || echo "not-found")

            if [ "$LATEST" = "not-found" ]; then
              echo "  ⚠ Could not fetch version for $PKG"
              continue
            fi

            echo "  Latest: $LATEST"

            # Extract the "Skill validated against" version from VERSIONS.md
            # Looks for the package name in the table and reads column 2
            PINNED=$(grep "^\| \`${PKG}\`" ../../VERSIONS.md 2>/dev/null \
              | awk -F'|' '{gsub(/ /,"",$3); print $3}' \
              | head -1)

            echo "  Pinned: $PINNED"

            if [ -z "$PINNED" ]; then
              echo "  ⚠ Could not find $PKG in VERSIONS.md — skipping"
              continue
            fi

            # Normalise: strip leading 0. or ^ or ~ from pinned version for comparison
            PINNED_CLEAN=$(echo "$PINNED" | sed 's/^[^0-9]*//')

            if [ "$LATEST" != "$PINNED_CLEAN" ]; then
              echo "  🔔 VERSION CHANGE: $PINNED_CLEAN → $LATEST"
              CHANGED_PACKAGES="${CHANGED_PACKAGES}${PKG}"
              ISSUE_BODY="${ISSUE_BODY}| \`${PKG}\` | \`${PINNED_CLEAN}\` | \`${LATEST}\` |\n"

              # Update VERSIONS.md: set "Latest on npm" column and status
              sed -i "s/| \`${PKG}\`\(.*\)| .*| .*| .*|/| \`${PKG}\`\1| ${LATEST} | Pending check | ${DATE} |/" ../../VERSIONS.md || true
            else
              echo "  ✓ Up to date ($LATEST)"
              # Update "Last checked" date even if no change
              sed -i "s/| \`${PKG}\`\(.*\)| Up to date | .* |/| \`${PKG}\`\1| Up to date | ${DATE} |/" ../../VERSIONS.md || true
            fi
          done

          if [ -n "$CHANGED_PACKAGES" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "issue_body<<EOF" >> $GITHUB_OUTPUT
            echo -e "${ISSUE_BODY}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ All packages are up to date"
          fi
        working-directory: fhevm-skill-demo/.github/workflows

      - name: Commit updated VERSIONS.md
        if: always()
        run: |
          git config user.name "skill-bot"
          git config user.email "skill-bot@users.noreply.github.com"
          git add VERSIONS.md
          git diff --staged --quiet || git commit -m "auto: update VERSIONS.md version check [skip ci]"
          git push
        working-directory: ${{ github.workspace }}

      - name: Open GitHub Issue for changed packages
        if: steps.version_check.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.version_check.outputs.issue_body }}

            ### What to do

            1. Review the changelogs for each updated package
            2. Update \`VERSIONS.md\` — set "Skill validated against" to the new version
            3. Check each SKILL file for patterns referencing the old API
            4. Update affected patterns, add new ones for new features
            5. Run \`pnpm test\` to verify 32/32 still pass
            6. Bump skill version, update \`CHANGELOG.md\`, close this issue

            **Packages to review:**
            - [@fhevm/solidity changelog](https://github.com/zama-ai/fhevm/releases)
            - [@zama-fhe/relayer-sdk changelog](https://www.npmjs.com/package/@zama-fhe/relayer-sdk?activeTab=versions)
            - [@fhevm/hardhat-plugin changelog](https://www.npmjs.com/package/@fhevm/hardhat-plugin?activeTab=versions)

            *Auto-generated by skill-watch-deps.yml*`;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[Gap] Zama package version change detected — skill review needed',
              body: body,
              labels: ['skill-gap', 'dependency-update'],
            });
