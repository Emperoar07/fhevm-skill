name: SKILL.md Docs Change Watcher

on:
  schedule:
    - cron: "0 8 * * 4" # Every Thursday at 08:00 UTC
  workflow_dispatch:

jobs:
  watch-zama-docs:
    name: Detect Zama documentation changes
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch Zama docs and compare snapshots
        id: docs_check
        run: |
          set -e
          DATE=$(date +%Y-%m-%d)
          CHANGED=false
          ISSUE_DETAILS=""

          mkdir -p .github/doc-snapshots

          PAGES=(
            "fhevm-solidity-api|https://docs.zama.org/protocol/reference/functions"
            "relayer-sdk-api|https://docs.zama.org/protocol/frontend/relayersdk"
            "fhevm-changelog|https://docs.zama.org/protocol/changelog"
            "acl-reference|https://docs.zama.org/protocol/reference/acl"
            "hardhat-plugin|https://docs.zama.org/protocol/reference/hardhattesting"
          )

          for ENTRY in "${PAGES[@]}"; do
            LABEL="${ENTRY%%|*}"
            URL="${ENTRY##*|}"
            SNAPSHOT_FILE=".github/doc-snapshots/${LABEL}.sha256"

            echo "Fetching: $URL"
            CONTENT=$(curl -s -L --max-time 30 --fail "$URL" 2>/dev/null || echo "FETCH_FAILED")
            if [ "$CONTENT" = "FETCH_FAILED" ]; then
              echo "  Could not fetch $URL - skipping"
              continue
            fi

            CLEANED=$(echo "$CONTENT" | sed 's/[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}T[0-9:\.Z-]*//g' | sed 's/nonce="[^"]*"//g' | sed 's/data-cache-key="[^"]*"//g')
            NEW_HASH=$(echo "$CLEANED" | sha256sum | cut -d' ' -f1)
            SHORT_HASH="${NEW_HASH:0:12}..."

            if [ -f "$SNAPSHOT_FILE" ]; then
              OLD_HASH=$(cat "$SNAPSHOT_FILE")
              if [ "$NEW_HASH" != "$OLD_HASH" ]; then
                CHANGED=true
                ISSUE_DETAILS="${ISSUE_DETAILS}- **${LABEL}**: content changed ([view page](${URL}))\n"
                echo "$NEW_HASH" > "$SNAPSHOT_FILE"
              fi
            else
              echo "$NEW_HASH" > "$SNAPSHOT_FILE"
            fi

            python3 - "$LABEL" "$DATE" "$SHORT_HASH" << 'PYEOF'
          import sys

          label, date, short_hash = sys.argv[1:4]
          source = f"`docs.zama.org/{label}`"

          with open("VERSIONS.md", "r", encoding="utf-8") as f:
              lines = f.readlines()

          header_idx = None
          for i, line in enumerate(lines):
              if line.strip() == "## Docs Snapshot Hash":
                  header_idx = i
                  break

          if header_idx is None:
              sys.exit(0)

          table_start = None
          for i in range(header_idx + 1, len(lines)):
              if lines[i].startswith("| Source |"):
                  table_start = i
                  break

          if table_start is None:
              sys.exit(0)

          table_end = table_start + 2
          while table_end < len(lines) and lines[table_end].startswith("|"):
              table_end += 1

          target_row = f"| {source} | {date} | `{short_hash}` |\n"
          found = False
          for i in range(table_start + 2, table_end):
              if lines[i].startswith(f"| {source} |"):
                  lines[i] = target_row
                  found = True
                  break

          if not found:
              lines.insert(table_end, target_row)

          with open("VERSIONS.md", "w", encoding="utf-8") as f:
              f.writelines(lines)
          PYEOF
          done

          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT
          if [ "${CHANGED}" = "true" ]; then
            echo "issue_details<<EOF" >> $GITHUB_OUTPUT
            echo -e "$ISSUE_DETAILS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated snapshots and VERSIONS.md
        if: always()
        run: |
          git config user.name "skill-bot"
          git config user.email "skill-bot@users.noreply.github.com"
          git add .github/doc-snapshots/ VERSIONS.md
          git diff --staged --quiet || git commit -m "auto: update doc snapshots [skip ci]"
          git push

      - name: Open GitHub Issue for changed docs
        if: steps.docs_check.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const details = `${{ steps.docs_check.outputs.issue_details }}`;
            const body = `## Zama Documentation Change Detected

            The weekly docs watcher found changes in the Zama documentation pages.
            The skill files may need updating if the API or patterns changed.

            ### Changed pages

            ${details}

            ### What to do

            1. Visit each changed page and review what changed
            2. Check if any SKILL file references outdated patterns or API signatures
            3. Update the relevant section(s) in the affected SKILL file(s)
            4. If a new feature is documented, consider adding a pattern or example
            5. Run \`pnpm test\` to verify existing tests still pass
            6. Bump skill version, update \`CHANGELOG.md\`, close this issue

            ### Skill files most likely affected

            | Changed page | Likely skill file |
            |---|---|
            | fhevm-solidity-api | SKILL-REFERENCE.md (sections 2-5) |
            | relayer-sdk-api | SKILL-REFERENCE.md (section 7), SKILL.md (section 9) |
            | fhevm-changelog | All skill files - review changelog carefully |
            | acl-reference | SKILL-REFERENCE.md (section 3), SKILL.md (section 6) |
            | hardhat-plugin | SKILL-TESTING.md |

            *Auto-generated by skill-watch-docs.yml*`;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "[Gap] Zama documentation change detected - skill review needed",
              body,
              labels: ["skill-gap", "docs-change"],
            });
