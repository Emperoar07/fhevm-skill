name: SKILL.md CI - Validate and Auto-Evolve

on:
  push:
    paths:
      - "SKILL.md"
      - "SKILL-REFERENCE.md"
      - "SKILL-TEMPLATES.md"
      - "SKILL-TESTING.md"
      - "packages/hardhat/**"
      - "packages/fhevm-sdk/**"
      - "packages/nextjs/**"
      - ".github/workflows/skill-*.yml"
  pull_request:
    paths:
      - "SKILL.md"
      - "SKILL-REFERENCE.md"
      - "SKILL-TEMPLATES.md"
      - "SKILL-TESTING.md"
      - "packages/hardhat/**"
      - "packages/fhevm-sdk/**"
      - "packages/nextjs/**"
      - ".github/workflows/skill-*.yml"

jobs:
  validate-skill:
    name: Validate contracts, SDK, and frontend types
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Compile contracts
        id: compile
        run: pnpm compile

      - name: Run hardhat tests
        id: hardhat_test
        run: pnpm test 2>&1 | tee hardhat-test-output.txt

      - name: Run SDK tests
        id: sdk_test
        run: pnpm sdk:test 2>&1 | tee sdk-test-output.txt

      - name: Run frontend type checks
        id: frontend_types
        run: pnpm next:check-types 2>&1 | tee frontend-typecheck-output.txt

      - name: Parse hardhat test results
        id: parse
        if: always()
        run: |
          PASSING=$(grep -oP '\d+(?= passing)' hardhat-test-output.txt || echo "0")
          FAILING=$(grep -oP '\d+(?= failing)' hardhat-test-output.txt || echo "0")
          PENDING=$(grep -oP '\d+(?= pending)' hardhat-test-output.txt || echo "0")
          echo "passing=$PASSING" >> $GITHUB_OUTPUT
          echo "failing=$FAILING" >> $GITHUB_OUTPUT
          echo "pending=$PENDING" >> $GITHUB_OUTPUT
          echo "### Hardhat Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Passing: $PASSING" >> $GITHUB_STEP_SUMMARY
          echo "- Failing: $FAILING" >> $GITHUB_STEP_SUMMARY
          echo "- Pending: $PENDING" >> $GITHUB_STEP_SUMMARY
          echo "- SDK tests: ${{ steps.sdk_test.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend type checks: ${{ steps.frontend_types.outcome }}" >> $GITHUB_STEP_SUMMARY

      - name: Auto-update KNOWN_GAPS.md on failure
        if: failure()
        run: |
          DATE=$(date +%Y-%m-%d)
          FAIL_SUMMARY="hardhat=${{ steps.hardhat_test.outcome }}, sdk=${{ steps.sdk_test.outcome }}, frontend_types=${{ steps.frontend_types.outcome }}"
          FAILED_LOGS=""

          if [ -f hardhat-test-output.txt ]; then
            FAILED_LOGS="${FAILED_LOGS}\n--- hardhat-test-output.txt ---\n$(tail -n 40 hardhat-test-output.txt)\n"
          fi
          if [ -f sdk-test-output.txt ]; then
            FAILED_LOGS="${FAILED_LOGS}\n--- sdk-test-output.txt ---\n$(tail -n 40 sdk-test-output.txt)\n"
          fi
          if [ -f frontend-typecheck-output.txt ]; then
            FAILED_LOGS="${FAILED_LOGS}\n--- frontend-typecheck-output.txt ---\n$(tail -n 40 frontend-typecheck-output.txt)\n"
          fi

          cat >> KNOWN_GAPS.md << EOF

          ---

          ### GAP-AUTO-${DATE} - CI detected validation failure

          **Status:** Confirmed failure
          **Detected:** ${DATE} by GitHub Actions (commit ${{ github.sha }})
          **Branch:** ${{ github.ref_name }}
          **Summary:** ${FAIL_SUMMARY}
          **Recent logs:**
          \`\`\`
          ${FAILED_LOGS}
          \`\`\`
          **Action required:** Review failing outputs, fix code or skill docs, and re-run validation.
          **Full logs:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

          git config user.name "skill-bot"
          git config user.email "skill-bot@users.noreply.github.com"
          git add KNOWN_GAPS.md
          git commit -m "auto: log CI failure to KNOWN_GAPS.md [skip ci]"
          git push

      - name: Auto-update CHANGELOG.md on success
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          DATE=$(date +%Y-%m-%d)
          PASSING=${{ steps.parse.outputs.passing }}
          PENDING=${{ steps.parse.outputs.pending }}
          VERSION=$(grep '^\| \*\*Version\*\*' SKILL.md | grep -oP '\d+\.\d+\.\d+' | head -1 || echo "unknown")

          cat > /tmp/ci_entry.md << EOF
          ## [CI-VALIDATED] - ${DATE}

          **Version:** ${VERSION}
          **Result:** hardhat=${PASSING} passing, ${PENDING} pending, 0 failing; sdk=passing; frontend types=passing
          **Commit:** ${{ github.sha }}
          **Triggered by:** push to main

          ---

          EOF

          python3 - << 'PYEOF'
          with open('/tmp/ci_entry.md', encoding='utf-8') as f:
              entry = f.read()
          with open('CHANGELOG.md', encoding='utf-8') as f:
              lines = f.readlines()
          insert_at = 1
          for i, line in enumerate(lines):
              if line.strip():
                  insert_at = i + 1
                  break
          lines.insert(insert_at, entry)
          with open('CHANGELOG.md', 'w', encoding='utf-8') as f:
              f.writelines(lines)
          PYEOF

          git config user.name "skill-bot"
          git config user.email "skill-bot@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "auto: log passing CI to CHANGELOG.md [skip ci]"
          git push

      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const passing = '${{ steps.parse.outputs.passing }}';
            const failing = '${{ steps.parse.outputs.failing }}';
            const pending = '${{ steps.parse.outputs.pending }}';
            const sdk = '${{ steps.sdk_test.outcome }}';
            const frontend = '${{ steps.frontend_types.outcome }}';
            const status = failing === '0' && sdk === 'success' && frontend === 'success'
              ? 'All validations passing'
              : 'One or more validations failed';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## SKILL.md Validation\n\n${status}\n\n| Hardhat Passing | Hardhat Failing | Hardhat Pending | SDK | Frontend Types |\n|---|---|---|---|---|\n| ${passing} | ${failing} | ${pending} | ${sdk} | ${frontend} |\n\n[View full logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });
